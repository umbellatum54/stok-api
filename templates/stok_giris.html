{% extends "layout.html" %}
{% block content %}

<h2>Stok Giriş</h2>

<div style="display:flex; gap:30px;">

<!-- SOL: GİRİŞ -->
<div style="flex:2;">

<form method="POST" onsubmit="return confirm('Kaydedilsin mi?')">

{% for i in range(1,6) %}
<div style="margin-bottom:10px; display:flex; gap:10px;">

<select name="urun{{i}}" onchange="renkGetir(this,'renk{{i}}')">
<option>Ürün</option>
{% for u in urun_dict.keys() %}
<option value="{{u}}">{{u}}</option>
{% endfor %}
</select>

<select name="renk{{i}}" id="renk{{i}}">
<option>Renk</option>
</select>

<input name="adet{{i}}" type="number" placeholder="Adet">

</div>
{% endfor %}

<button class="btn green">Kaydet</button>

</form>

</div>


<!-- SAĞ: SON KAYIT -->
<div style="flex:1; background:white; padding:10px;">
<h4>Son Girişler</h4>

{% for s in son %}
<p>
{{s[0]}} - {{s[1]}} - {{s[2]}} <br>
<small>{{s[3]}}</small>
</p>
{% endfor %}

</div>

</div>


<!-- ALT: STOK -->
<div style="margin-top:30px; background:white; padding:10px;">

<h3>Güncel Stok</h3>

<table border="1" width="100%">
<tr>
<th>Ürün</th>
<th>Renk</th>
<th>Stok</th>
</tr>

{% for s in stoklar %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
</tr>
{% endfor %}

</table>

</div>


<script>
const data = {{ urun_dict | tojson }};

function renkGetir(el, hedef){
    let r = document.getElementById(hedef);
    r.innerHTML="";

    if(data[el.value]){
        data[el.value].forEach(x=>{
            let o=document.createElement("option");
            o.value=x;
            o.text=x;
            r.appendChild(o);
        });
    }
}
</script>

{% endblock %}
