{% extends "layout.html" %}

{% block content %}

<h2>Stok Giriş - Üretimden</h2>

<form>

    {% for i in range(1,11) %}
    <div style="margin-bottom:10px;">

        <select name="urun">
            <option value="">Ürün seç</option>
            {% for u in urunler %}
                <option value="{{ u[0] }}">{{ u[0] }}</option>
            {% endfor %}
        </select>

        <input type="text" name="renk" placeholder="Renk">
        <input type="number" name="adet" placeholder="Adet">

    </div>
    {% endfor %}

    <button class="btn green">Kaydet</button>
</form>

{% endblock %}
