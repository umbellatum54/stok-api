{% extends "layout.html" %}

{% block content %}

<h2>Stok Giriş - Üretimden</h2>

<form method="POST" action="/stok-toplu-giris">

    {% for i in range(1,11) %}
    <div style="margin-bottom:10px;">
        <select name="urun{{i}}">
            <option value="">Ürün seç</option>
            {% for u in urun_map %}
                <option value="{{u}}">{{u}}</option>
            {% endfor %}
        </select>

        <input type="text" name="renk{{i}}" placeholder="Renk">
        <input type="number" name="adet{{i}}" placeholder="Adet">
    </div>
    {% endfor %}

    <button class="btn green">Kaydet</button>
</form>

{% endblock %}
